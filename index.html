<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Perfume Luxo</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f0f0f;
color:white;
}

/* NAVBAR */

header{
position:fixed;
top:0;
width:100%;
background:#000;
z-index:1000;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
}

.logo{
color:gold;
font-size:22px;
font-weight:bold;
}

nav ul{
display:flex;
gap:25px;
list-style:none;
}

nav a{
color:white;
text-decoration:none;
}

nav a:hover{
color:gold;
}

.cart-btn{
cursor:pointer;
font-size:20px;
}

/* BANNER */

.banner{
height:70vh;
margin-top:70px;
position:relative;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
background-size:cover;
background-position:center;
opacity:0;
transition:1s;
display:flex;
align-items:center;
justify-content:center;
}

.slide.active{
opacity:1;
}

.slide-content{
background:rgba(0,0,0,.6);
padding:30px 60px;
border-radius:10px;
text-align:center;
}

.slide-content h2{
font-size:40px;
}

.banner-btn{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:25px;
background:rgba(0,0,0,.5);
border:none;
color:white;
padding:10px;
cursor:pointer;
}

.prev{left:20px}
.next{right:20px}

/* BUSCA */

.search{
text-align:center;
padding:40px;
}

.search input{
padding:10px;
width:300px;
border-radius:5px;
border:none;
}

/* CATEGORIAS */

.categorias{
display:flex;
justify-content:center;
gap:15px;
margin-bottom:30px;
flex-wrap:wrap;
}

.categorias button{
padding:8px 15px;
border:none;
background:#222;
color:white;
cursor:pointer;
border-radius:5px;
}

.categorias button:hover{
background:gold;
color:black;
}

/* PRODUTOS */

.produtos{
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.card{
background:#1a1a1a;
padding:15px;
border-radius:10px;
cursor:pointer;
transition:.3s;
position:relative;
text-align:center;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 15px gold;
}

.card img{
width:100%;
border-radius:10px;
}

.preco{
color:gold;
font-weight:bold;
margin:10px 0;
}

.badge{
position:absolute;
top:10px;
left:10px;
background:red;
padding:5px 10px;
font-size:12px;
border-radius:5px;
}

.estoque{
font-size:12px;
color:#aaa;
}

.stars{
color:gold;
margin-bottom:5px;
}

/* CARRINHO */

.cart{
position:fixed;
right:-400px;
top:0;
width:350px;
height:100%;
background:#111;
padding:20px;
transition:.4s;
overflow:auto;
}

.cart.open{
right:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:10px 0;
}

.cart-item button{
background:red;
border:none;
color:white;
padding:5px;
cursor:pointer;
}

/* WHATSAPP FLOAT */

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
text-decoration:none;
color:white;
}

/* FOOTER */

footer{
background:#000;
text-align:center;
padding:40px;
margin-top:40px;
}

</style>
</head>

<body>

<header>

<nav>

<div class="logo">Perfume Luxo</div>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#produtos">Produtos</a></li>
<li><a href="#sobre">Sobre</a></li>
<li><a href="#contato">Contato</a></li>
</ul>

<div class="cart-btn" onclick="toggleCart()">🛒</div>

</nav>

</header>

<!-- BANNER -->

<section class="banner">

<div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1595425970377-7f0b9e7d7b2f')">
<div class="slide-content">
<h2>Perfumes Importados</h2>
<p>Elegância e sofisticação</p>
</div>
</div>

<div class="slide" style="background-image:url('https://images.unsplash.com/photo-1585386959984-a41552231658')">
<div class="slide-content">
<h2>Fragrâncias Exclusivas</h2>
<p>Luxo em cada detalhe</p>
</div>
</div>

<button class="banner-btn prev" onclick="mudarSlide(-1)">❮</button>
<button class="banner-btn next" onclick="mudarSlide(1)">❯</button>

</section>

<!-- BUSCA -->

<section class="search">

<input type="text" placeholder="Buscar perfume..." onkeyup="buscar(this.value)">

</section>

<!-- PRODUTOS -->

<section class="produtos" id="produtos">

<div class="categorias">

<button onclick="filtrar('todos')">Todos</button>
<button onclick="filtrar('amadeirado')">Amadeirado</button>
<button onclick="filtrar('oriental')">Oriental</button>
<button onclick="filtrar('citrico')">Cítrico</button>
<button onclick="filtrar('doce')">Doce</button>

</div>

<div class="grid" id="grid"></div>

</section>

<!-- CARRINHO -->

<div class="cart" id="cart">

<h2>Carrinho</h2>

<div id="cartItens"></div>

<br>

<button onclick="toggleCart()">Fechar</button>

<br><br>

<button onclick="finalizar()">Finalizar no WhatsApp</button>

</div>

<!-- SOBRE -->

<section id="sobre">

<footer>

<h2>Sobre</h2>
<p>Especialistas em perfumes importados</p>

</footer>

</section>

<!-- CONTATO -->

<section id="contato">

<footer>

<h2>Contato</h2>

<p>WhatsApp: Marcele</p>
<p>Email: motojhon@gmail.com</p>

</footer>

</section>

<a class="whatsapp" href="https://wa.me/5521965109590" target="_blank">💬</a>

<script>

/* PERFUMES */

let categorias=["amadeirado","oriental","citrico","doce"]

let perfumes=[]

for(let i=1;i<=12;i++){

perfumes.push({
nome:"Perfume "+i,
preco:199,
categoria:categorias[i%4],
img:"https://source.unsplash.com/400x400/?perfume"
})

}

/* RENDER */

function render(lista=perfumes){

let grid=document.getElementById("grid")
grid.innerHTML=""

lista.forEach((p,i)=>{

grid.innerHTML+=`

<div class="card">

${i==1||i==4||i==7?'<div class="badge">Mais Vendido</div>':''}

<img src="${p.img}">

<h3>${p.nome}</h3>

<div class="stars">★★★★★</div>

<div class="preco">R$ ${p.preco}</div>

<div class="estoque">Restam poucas unidades</div>

<button onclick="addCarrinho(${i})">Adicionar</button>

</div>

`

})

}

render()

/* BUSCA */

function buscar(txt){

txt=txt.toLowerCase()

let filtrado=perfumes.filter(p=>p.nome.toLowerCase().includes(txt))

render(filtrado)

}

/* FILTRO */

function filtrar(cat){

if(cat=="todos") render()

else{

let filtrado=perfumes.filter(p=>p.categoria==cat)

render(filtrado)

}

}

/* CARRINHO */

let carrinho=[]

function addCarrinho(i){

let item=carrinho.find(p=>p.nome==perfumes[i].nome)

if(item){

item.qtd++

}else{

carrinho.push({...perfumes[i],qtd:1})

}

renderCart()

}

function renderCart(){

let div=document.getElementById("cartItens")
div.innerHTML=""

carrinho.forEach((p,i)=>{

div.innerHTML+=`

<div class="cart-item">

${p.nome} (${p.qtd})

<button onclick="remover(${i})">X</button>

</div>

`

})

}

function remover(i){

carrinho.splice(i,1)

renderCart()

}

function toggleCart(){

document.getElementById("cart").classList.toggle("open")

}

/* WHATSAPP */

function finalizar(){

let msg="Olá, gostaria de comprar:%0A"

carrinho.forEach(p=>{
msg+=`${p.nome} x${p.qtd}%0A`
})

window.open("https://wa.me/5521965109590?text="+msg)

}

/* BANNER */

let slides=document.querySelectorAll(".slide")
let index=0

function mudarSlide(n){

index+=n

if(index>=slides.length)index=0
if(index<0)index=slides.length-1

slides.forEach(s=>s.classList.remove("active"))
slides[index].classList.add("active")

}

setInterval(()=>{

mudarSlide(1)

},5000)

</script>

</body>
</html>

</head>

<body>

<nav>

<div class="logo">Moto Jhon</div>

<div class="menu">

<a href="#">Início</a>
<a href="#">Perfumes</a>
<a href="#">Contato</a>

</div>

<a class="whatsapp" href="https://wa.me/5521965109590">
WhatsApp
</a>

</nav>

<section class="hero">

<h1>Perfumes Importados</h1>

<p>Fragrâncias marcantes para todos os estilos</p>

</section>

<div class="container">

<div class="grid" id="produtos"></div>

<div class="cart">

<h2>Seu pedido</h2>

<div id="cart-items">
Carrinho vazio
</div>

<div class="total">

<span>Total</span>
<span id="total">R$ 0</span>

</div>

<button class="btn-zap" onclick="checkout()">
Finalizar no WhatsApp
</button>

</div>

</div>

<footer>

Perfumes Importados • Atendimento via WhatsApp

</footer>

<script>

const produtos=[

{nome:"Perfume 1",preco:350,img:"https://images.unsplash.com/photo-1541643600914-78b084683601"},
{nome:"Perfume 2",preco:420,img:"https://images.unsplash.com/photo-1585386959984-a41552231658"},
{nome:"Perfume 3",preco:390,img:"https://images.unsplash.com/photo-1600180758890-6b94519a8ba3"},
{nome:"Perfume 4",preco:450,img:"https://images.unsplash.com/photo-1595425970377-7f0b9e7d7b2f"},
{nome:"Perfume 5",preco:480,img:"https://images.unsplash.com/photo-1615634260167-c8cdede054de"},
{nome:"Perfume 6",preco:360,img:"https://images.unsplash.com/photo-1523293182086-7651a899d37f"},
{nome:"Perfume 7",preco:510,img:"https://images.unsplash.com/photo-1587019158091-1a103c5dd17f"},
{nome:"Perfume 8",preco:430,img:"https://images.unsplash.com/photo-1592914610354-fd354ea45e48"},
{nome:"Perfume 9",preco:370,img:"https://images.unsplash.com/photo-1600185365483-26d7a4cc7519"},
{nome:"Perfume 10",preco:460,img:"https://images.unsplash.com/photo-1615634260167-c8cdede054de"},
{nome:"Perfume 11",preco:390,img:"https://images.unsplash.com/photo-1585386959984-a41552231658"},
{nome:"Perfume 12",preco:520,img:"https://images.unsplash.com/photo-1541643600914-78b084683601"}

]

const grid=document.getElementById("produtos")

produtos.forEach(p=>{

grid.innerHTML+=`

<div class="card">

<img src="${p.img}">

<div class="card-body">

<h3>${p.nome}</h3>

<p>Fragrância sofisticada e marcante.</p>

<div class="price">R$ ${p.preco}</div>

<button class="btn" onclick="add('${p.nome}',${p.preco})">
Adicionar ao carrinho
</button>

</div>

</div>

`

})

let cart=[]

function add(nome,preco){

const item=cart.find(i=>i.nome===nome)

if(item){
item.qtd++
}else{
cart.push({nome,preco,qtd:1})
}

render()

}

function alterar(nome,valor){

const item=cart.find(i=>i.nome===nome)

item.qtd+=valor

if(item.qtd<=0){
cart=cart.filter(i=>i.nome!==nome)
}

render()

}

function remover(nome){

cart=cart.filter(i=>i.nome!==nome)

render()

}

function render(){

const el=document.getElementById("cart-items")

if(cart.length===0){

el.innerHTML="Carrinho vazio"
document.getElementById("total").innerText="R$ 0"
return

}

let html=""
let total=0

cart.forEach(i=>{

total+=i.preco*i.qtd

html+=`

<div class="cart-item">

<strong>${i.nome}</strong>

<div class="qty">

<button onclick="alterar('${i.nome}',-1)">-</button>
<span>${i.qtd}</span>
<button onclick="alterar('${i.nome}',1)">+</button>

</div>

<div class="remove" onclick="remover('${i.nome}')">
remover
</div>

</div>

`

})

el.innerHTML=html
document.getElementById("total").innerText="R$ "+total

}

function checkout(){

if(cart.length===0){

alert("Adicione produtos")

return

}

let msg="Pedido:%0A"
let total=0

cart.forEach(i=>{

msg+=`${i.qtd}x ${i.nome}%0A`
total+=i.preco*i.qtd

})

msg+=`%0ATotal: R$ ${total}`

window.open(`https://wa.me/5521965109590?text=${msg}`)

}

</script>

</body>
</html>

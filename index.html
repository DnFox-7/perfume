<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Perfume Luxo</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f0f0f;
color:white;
}

/* NAVBAR */

header{
position:fixed;
top:0;
width:100%;
background:#000;
z-index:1000;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
}

.logo{
color:gold;
font-size:22px;
font-weight:bold;
}

nav ul{
display:flex;
gap:25px;
list-style:none;
}

nav a{
color:white;
text-decoration:none;
}

nav a:hover{
color:gold;
}

.cart-btn{
cursor:pointer;
font-size:22px;
}

/* BANNER */

.banner{
height:70vh;
margin-top:70px;
position:relative;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
background-size:cover;
background-position:center;
opacity:0;
transition:1s;
display:flex;
align-items:center;
justify-content:center;
}

.slide.active{
opacity:1;
}

.slide-content{
background:rgba(0,0,0,.6);
padding:30px 60px;
border-radius:10px;
text-align:center;
}

.slide-content h2{
font-size:40px;
}

.banner-btn{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:25px;
background:rgba(0,0,0,.5);
border:none;
color:white;
padding:10px;
cursor:pointer;
}

.prev{left:20px}
.next{right:20px}

/* BUSCA */

.search{
text-align:center;
padding:40px;
}

.search input{
padding:12px;
width:320px;
border-radius:6px;
border:none;
}

/* CATEGORIAS */

.categorias{
display:flex;
justify-content:center;
gap:15px;
margin-bottom:30px;
flex-wrap:wrap;
}

.categorias button{
padding:8px 15px;
border:none;
background:#222;
color:white;
cursor:pointer;
border-radius:5px;
}

.categorias button:hover{
background:gold;
color:black;
}

/* PRODUTOS */

.produtos{
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.card{
background:#1a1a1a;
padding:15px;
border-radius:10px;
cursor:pointer;
transition:.3s;
position:relative;
text-align:center;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 15px gold;
}

.card img{
width:100%;
border-radius:10px;
}

.preco{
color:gold;
font-weight:bold;
margin:10px 0;
font-size:18px;
}

.stars{
color:gold;
margin-bottom:5px;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
align-items:center;
justify-content:center;
z-index:2000;
}

.modal-content{
background:#111;
padding:30px;
border-radius:10px;
max-width:500px;
width:90%;
text-align:center;
position:relative;
animation:modalOpen .3s;
}

@keyframes modalOpen{
from{transform:scale(.8);opacity:0}
to{transform:scale(1);opacity:1}
}

.modal-content img{
width:100%;
border-radius:10px;
transition:.3s;
cursor:zoom-in;
}

.modal-content img:hover{
transform:scale(1.15);
}

.close{
position:absolute;
top:10px;
right:15px;
font-size:28px;
cursor:pointer;
}

.modal-content button{
margin-top:15px;
padding:12px 20px;
border:none;
background:gold;
color:black;
font-weight:bold;
cursor:pointer;
border-radius:5px;
}

/* CARRINHO */

.cart{
position:fixed;
right:-400px;
top:0;
width:360px;
height:100%;
background:#0d0d0d;
padding:25px;
transition:.4s;
overflow:auto;
border-left:2px solid gold;
}

.cart.open{
right:0;
}

.cart-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.close-cart{
cursor:pointer;
font-size:22px;
}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
background:#1a1a1a;
padding:10px;
border-radius:8px;
}

.cart-item button{
background:red;
border:none;
color:white;
padding:5px 8px;
cursor:pointer;
border-radius:4px;
}

.cart-total{
margin-top:20px;
font-size:18px;
color:gold;
}

.cart button.finalizar{
margin-top:20px;
width:100%;
padding:12px;
background:gold;
border:none;
font-weight:bold;
cursor:pointer;
border-radius:5px;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
text-decoration:none;
color:white;
}

footer{
background:#000;
text-align:center;
padding:40px;
margin-top:40px;
}

</style>

</head>

<body>

<header>

<nav>

<div class="logo">Perfume Luxo</div>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#produtos">Produtos</a></li>
<li><a href="#sobre">Sobre</a></li>
<li><a href="#contato">Contato</a></li>
</ul>

<div class="cart-btn" onclick="toggleCart()">🛒</div>

</nav>

</header>

<section class="banner">

<div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1595425970377-7f0b9e7d7b2f')">
<div class="slide-content">
<h2>Perfumes Importados</h2>
<p>Elegância e sofisticação</p>
</div>
</div>

<div class="slide" style="background-image:url('https://images.unsplash.com/photo-1585386959984-a41552231658')">
<div class="slide-content">
<h2>Fragrâncias Exclusivas</h2>
<p>Luxo em cada detalhe</p>
</div>
</div>

<button class="banner-btn prev" onclick="mudarSlide(-1)">❮</button>
<button class="banner-btn next" onclick="mudarSlide(1)">❯</button>

</section>

<section class="search">
<input type="text" placeholder="Buscar perfume..." onkeyup="buscar(this.value)">
</section>

<section class="produtos" id="produtos">

<div class="categorias">
<button onclick="filtrar('todos')">Todos</button>
<button onclick="filtrar('amadeirado')">Amadeirado</button>
<button onclick="filtrar('oriental')">Oriental</button>
<button onclick="filtrar('citrico')">Cítrico</button>
<button onclick="filtrar('doce')">Doce</button>
</div>

<div class="grid" id="grid"></div>

</section>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-content">

<span class="close" onclick="fecharModal()">×</span>

<img id="modalImg">

<h2 id="modalNome"></h2>

<p id="modalDesc"></p>

<div class="preco" id="modalPreco"></div>

<button onclick="addCarrinho(modalIndex);fecharModal()">Adicionar ao carrinho</button>

</div>

</div>

<!-- CARRINHO -->

<div class="cart" id="cart">

<div class="cart-header">
<h2>Carrinho</h2>
<span class="close-cart" onclick="toggleCart()">✕</span>
</div>

<div id="cartItens"></div>

<div class="cart-total" id="cartTotal"></div>

<button class="finalizar" onclick="finalizar()">Finalizar no WhatsApp</button>

</div>

<footer id="sobre">
<h2>Sobre</h2>
<p>Especialistas em perfumes importados</p>
</footer>

<footer id="contato">
<h2>Contato</h2>
<p>WhatsApp: Marcele</p>
<p>Email: motojhon@gmail.com</p>
</footer>

<a class="whatsapp" href="https://wa.me/5521965109590" target="_blank">💬</a>

<script>

let categorias=["amadeirado","oriental","citrico","doce"]

let perfumes=[]

let descricoes=[
"Fragrância intensa com notas amadeiradas elegantes.",
"Aroma oriental sofisticado e marcante.",
"Perfume cítrico refrescante e moderno.",
"Fragrância doce envolvente e sedutora."
]

for(let i=1;i<=12;i++){

perfumes.push({
nome:"Perfume "+i,
preco:199,
categoria:categorias[i%4],
desc:descricoes[i%4],
img:"https://source.unsplash.com/400x400/?perfume"
})

}

function render(lista=perfumes){

let grid=document.getElementById("grid")
grid.innerHTML=""

lista.forEach((p,i)=>{

grid.innerHTML+=`

<div class="card" onclick="abrirModal(${i})">

<img src="${p.img}">

<h3>${p.nome}</h3>

<div class="stars">★★★★★</div>

<div class="preco">R$ ${p.preco}</div>

</div>

`

})

}

render()

let modalIndex=0

function abrirModal(i){

modalIndex=i

document.getElementById("modal").style.display="flex"

document.getElementById("modalImg").src=perfumes[i].img
document.getElementById("modalNome").innerText=perfumes[i].nome
document.getElementById("modalDesc").innerText=perfumes[i].desc
document.getElementById("modalPreco").innerText="R$ "+perfumes[i].preco

}

function fecharModal(){
document.getElementById("modal").style.display="none"
}

/* FECHAR CLICANDO FORA */

window.onclick=function(e){

let modal=document.getElementById("modal")

if(e.target==modal){
fecharModal()
}

}

/* FECHAR COM ESC */

document.addEventListener("keydown",function(e){

if(e.key==="Escape"){
fecharModal()
}

})

</script>

</body>
</html>

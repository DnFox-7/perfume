<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Perfume Luxo</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f0f0f;
color:white;
}

/* NAVBAR */

header{
position:fixed;
top:0;
width:100%;
background:black;
z-index:1000;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
}

.logo{
color:gold;
font-size:22px;
font-weight:bold;
}

nav ul{
display:flex;
gap:25px;
list-style:none;
}

nav a{
color:white;
text-decoration:none;
}

.cart-btn{
cursor:pointer;
font-size:22px;
}

#cartCount{
background:red;
border-radius:50%;
padding:3px 7px;
font-size:12px;
margin-left:5px;
}

/* TIMER */

.timer{
text-align:center;
padding:10px;
background:#111;
color:gold;
margin-top:70px;
}

/* BUSCA */

.search{
text-align:center;
padding:30px;
}

.search input{
padding:10px;
width:300px;
border:none;
border-radius:5px;
}

/* PRODUTOS */

.produtos{
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

/* CARD */

.card{

background:linear-gradient(145deg,#141414,#0b0b0b);
border-radius:12px;
padding:20px;
text-align:center;
position:relative;
transition:.4s;
border:1px solid rgba(255,215,0,0.2);

}

.card:hover{

transform:translateY(-8px);
box-shadow:0 0 25px rgba(255,215,0,0.4);

}

.card img{
width:100%;
border-radius:10px;
transition:.4s;
}

.card:hover img{
transform:scale(1.05);
}

/* PROMO */

.promo{
position:absolute;
top:10px;
right:10px;
background:gold;
color:black;
font-size:11px;
padding:5px 8px;
border-radius:5px;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

/* FAVORITO */

.favorito{
position:absolute;
top:10px;
left:10px;
cursor:pointer;
font-size:18px;
}

/* PREÇO */

.preco{
color:gold;
font-size:20px;
font-weight:bold;
margin:10px 0;
}

.descricao{
font-size:13px;
color:#ccc;
}

.viewing{
font-size:12px;
color:#aaa;
margin-top:5px;
}

.estoque{
font-size:12px;
color:#bbb;
}

/* BOTÃO */

.add{
background:gold;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
width:100%;
margin-top:10px;
}

/* CARRINHO */

.cart{
position:fixed;
right:-400px;
top:0;
width:350px;
height:100%;
background:#111;
padding:20px;
transition:.4s;
overflow:auto;
border-left:2px solid gold;
}

.cart.open{
right:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:10px 0;
background:#1a1a1a;
padding:8px;
border-radius:5px;
}

.cart-item button{
background:red;
border:none;
color:white;
padding:4px 6px;
cursor:pointer;
}

.cart-total{
margin-top:15px;
color:gold;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
text-decoration:none;
color:white;
}

</style>

</head>

<body>

<header>

<nav>

<div class="logo">Perfume Luxo</div>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#produtos">Produtos</a></li>
<li><a href="#">Sobre</a></li>
<li><a href="#">Contato</a></li>
</ul>

<div class="cart-btn" onclick="toggleCart()">
🛒 <span id="cartCount">0</span>
</div>

</nav>

</header>

<div class="timer">
Promoção termina em <span id="tempo">10:00</span>
</div>

<section class="search">
<input type="text" placeholder="Buscar perfume..." onkeyup="buscar(this.value)">
</section>

<section class="produtos" id="produtos">

<div class="grid" id="grid"></div>

</section>

<!-- CARRINHO -->

<div class="cart" id="cart">

<h2>Carrinho</h2>

<div id="cartItens"></div>

<div class="cart-total" id="cartTotal"></div>

<button onclick="finalizar()">Finalizar no WhatsApp</button>

</div>

<a class="whatsapp" href="https://wa.me/5521965109590" target="_blank">💬</a>

<script>

/* TIMER PROMOÇÃO */

let tempo = 600

setInterval(()=>{

let min=Math.floor(tempo/60)
let seg=tempo%60

document.getElementById("tempo").innerText=
min+":"+seg.toString().padStart(2,"0")

tempo--

},1000)

/* PERFUMES */

let descricoes=[

"Fragrância sofisticada com notas amadeiradas.",
"Perfume oriental intenso e marcante.",
"Aroma cítrico refrescante e moderno.",
"Perfume doce com toque sensual.",
"Notas amadeiradas luxuosas.",
"Fragrância elegante para qualquer ocasião.",
"Perfume inspirado em fragrâncias importadas.",
"Aroma forte com excelente fixação.",
"Perfume moderno com notas frescas.",
"Fragrância sofisticada e elegante.",
"Perfume sedutor com toque doce.",
"Aroma exclusivo de alta qualidade."

]

let perfumes=[]

for(let i=1;i<=12;i++){

perfumes.push({

nome:"Perfume "+i,
preco:199,
desc:descricoes[i-1],
img:"https://source.unsplash.com/400x400/?perfume",
estoque:Math.floor(Math.random()*10)+3,
viewing:Math.floor(Math.random()*40)+10

})

}

/* RENDER */

function render(lista=perfumes){

let grid=document.getElementById("grid")

grid.innerHTML=""

lista.forEach((p,i)=>{

grid.innerHTML+=`

<div class="card">

<div class="promo">PROMO</div>

<div class="favorito" onclick="favoritar(this)">❤</div>

<img src="${p.img}">

<h3>${p.nome}</h3>

<div class="stars">★★★★★</div>

<p class="descricao">${p.desc}</p>

<div class="preco">R$ ${p.preco}</div>

<div class="estoque">Restam ${p.estoque} unidades</div>

<div class="viewing">👁 ${p.viewing} pessoas vendo</div>

<button class="add" onclick="addCarrinho(${i})">
Adicionar ao carrinho
</button>

</div>

`

})

}

render()

/* FAVORITAR */

function favoritar(el){

el.classList.toggle("ativo")

if(el.style.color=="red"){

el.style.color="white"

}else{

el.style.color="red"

}

}

/* CARRINHO */

let carrinho=[]

function addCarrinho(i){

let item=carrinho.find(p=>p.nome==perfumes[i].nome)

if(item){

item.qtd++

}else{

carrinho.push({...perfumes[i],qtd:1})

}

renderCart()

}

/* RENDER CARRINHO */

function renderCart(){

let div=document.getElementById("cartItens")

div.innerHTML=""

let total=0

carrinho.forEach((p,i)=>{

total+=p.preco*p.qtd

div.innerHTML+=`

<div class="cart-item">

<span>${p.nome} x${p.qtd}</span>

<button onclick="remover(${i})">X</button>

</div>

`

})

document.getElementById("cartTotal").innerText="Total: R$ "+total

let totalItens=carrinho.reduce((acc,p)=>acc+p.qtd,0)

document.getElementById("cartCount").innerText=totalItens

}

/* REMOVER */

function remover(i){

carrinho.splice(i,1)

renderCart()

}

/* ABRIR CARRINHO */

function toggleCart(){

document.getElementById("cart").classList.toggle("open")

}

/* BUSCA */

function buscar(txt){

txt=txt.toLowerCase()

let filtrado=perfumes.filter(p=>p.nome.toLowerCase().includes(txt))

render(filtrado)

}

/* WHATSAPP */

function finalizar(){

let msg="Olá, gostaria de comprar:%0A"

carrinho.forEach(p=>{
msg+=`${p.nome} x${p.qtd}%0A`
})

window.open("https://wa.me/5521965109590?text="+msg)

}

</script>

</body>
</html>

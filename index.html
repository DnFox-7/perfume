<!DOCTYPE html> <html lang="pt-br"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>MOTO JHON | Perfumes Importados</title> <style> /* Reset e fontes */ *{margin:0;padding:0;box-sizing:border-box;font-family:'Arial',sans-serif;} body{background:#0f0f0f;color:white;} a{text-decoration:none;color:inherit;} /* NAVBAR */ header{position:fixed;top:0;width:100%;background:#000;z-index:1000;} nav{display:flex;justify-content:space-between;align-items:center;padding:15px 40px;} .logo{color:gold;font-size:22px;font-weight:bold;} nav ul{display:flex;gap:25px;list-style:none;} nav a:hover{color:gold;} .cart-btn{cursor:pointer;font-size:20px;} /* MOBILE MENU */ .mobile-menu{display:none;position:fixed;top:0;right:0;width:250px;height:100%;background:#111;z-index:1100;flex-direction:column;padding:50px 20px;transition:.3s;} .mobile-menu.open{right:0;} .mobile-menu a{margin:15px 0;font-size:18px;color:white;} .mobile-toggle{display:none;cursor:pointer;font-size:25px;color:gold;} /* BANNER */ .banner{height:70vh;margin-top:70px;position:relative;overflow:hidden;} .slide{position:absolute;width:100%;height:100%;background-size:cover;background-position:center;opacity:0;transition:1s;display:flex;align-items:center;justify-content:center;} .slide.active{opacity:1;} .slide-content{background:rgba(0,0,0,.6);padding:30px 60px;border-radius:10px;text-align:center;} .slide-content h2{font-size:40px;} .banner-btn{position:absolute;top:50%;transform:translateY(-50%);font-size:25px;background:rgba(0,0,0,.5);border:none;color:white;padding:10px;cursor:pointer;} .prev{left:20px} .next{right:20px} /* BUSCA */ .search{text-align:center;padding:40px;} .search input{padding:10px;width:300px;border-radius:5px;border:none;} /* CATEGORIAS */ .categorias{display:flex;justify-content:center;gap:15px;margin-bottom:30px;flex-wrap:wrap;} .categorias button{padding:8px 15px;border:none;background:#222;color:white;cursor:pointer;border-radius:5px;} .categorias button:hover{background:gold;color:black;} /* PRODUTOS */ .produtos{padding:40px;} .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:25px;} .card{background:#1a1a1a;padding:15px;border-radius:10px;cursor:pointer;transition:.3s;position:relative;text-align:center;} .card:hover{transform:translateY(-5px);box-shadow:0 0 15px gold;} .card img{width:100%;border-radius:10px;} .preco{color:gold;font-weight:bold;margin:10px 0;} .badge{position:absolute;top:10px;left:10px;background:red;padding:5px 10px;font-size:12px;border-radius:5px;animation:blink 1s infinite;} @keyframes blink{0%,50%,100%{opacity:1}25%,75%{opacity:0}} .estoque{font-size:12px;color:#aaa;} .stars{color:gold;margin-bottom:5px;} /* MODAL */ .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);align-items:center;justify-content:center;z-index:1200;} .modal-content{background:#111;padding:30px;border-radius:10px;max-width:500px;text-align:center;position:relative;} .modal-content img{width:100%;border-radius:10px;transition:.3s;cursor:zoom-in;} .modal-content img:hover{transform:scale(1.2);} .close{position:absolute;top:15px;right:20px;font-size:30px;cursor:pointer;} /* CARRINHO */ .cart{position:fixed;right:-400px;top:0;width:350px;height:100%;background:#111;padding:20px;transition:.4s;overflow:auto;z-index:1150;} .cart.open{right:0;} .cart h2{margin-bottom:15px;text-align:center;} .cart-item{display:flex;justify-content:space-between;align-items:center;margin:10px 0;background:#222;padding:10px;border-radius:8px;} .cart-item span{flex:1;} .cart-item button{background:red;border:none;color:white;padding:5px 10px;cursor:pointer;border-radius:5px;} .cart-footer{text-align:center;margin-top:20px;} .cart-footer button{padding:12px 20px;background:#25D366;color:white;border:none;border-radius:8px;cursor:pointer;font-weight:bold;} .cart-footer button:hover{opacity:.9;} /* NOTIFICAÇÃO FAKE */ .notification{position:fixed;bottom:100px;left:20px;background:#222;padding:15px 20px;border-radius:8px;box-shadow:0 0 10px gold;opacity:0;transition:.5s;z-index:1300;} /* WHATSAPP */ .whatsapp{position:fixed;bottom:20px;right:20px;background:#25D366;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;text-decoration:none;color:white;} /* FOOTER */ footer{background:#000;text-align:center;padding:40px;margin-top:40px;} @media(max-width:768px){nav ul{display:none;} .mobile-toggle{display:block;} .mobile-menu{right:-250px;display:flex;}} </style> </head> <body> <header> <nav> <div class="logo">MOTO JHON</div> <ul> <li><a href="#">Home</a></li> <li><a href="#produtos">Produtos</a></li> <li><a href="#sobre">Sobre</a></li> <li><a href="#contato">Contato</a></li> </ul> <div class="mobile-toggle" onclick="toggleMobile()">☰</div> <div class="cart-btn" onclick="toggleCart()">🛒</div> </nav> <div class="mobile-menu" id="mobileMenu"> <a href="#">Home</a> <a href="#produtos">Produtos</a> <a href="#sobre">Sobre</a> <a href="#contato">Contato</a> </div> </header> <!-- BANNER --> <section class="banner"> <div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1595425970377-7f0b9e7d7b2f')"> <div class="slide-content"><h2>Perfumes Importados</h2><p>Elegância e sofisticação</p></div></div> <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1585386959984-a41552231658')"> <div class="slide-content"><h2>Fragrâncias Exclusivas</h2><p>Luxo em cada detalhe</p></div></div> <button class="banner-btn prev" onclick="mudarSlide(-1)">❮</button> <button class="banner-btn next" onclick="mudarSlide(1)">❯</button> </section> <!-- BUSCA --> <section class="search"> <input type="text" placeholder="Buscar perfume..." onkeyup="buscar(this.value)"> </section> <!-- PRODUTOS --> <section class="produtos" id="produtos"> <div class="categorias"> <button onclick="filtrar('todos')">Todos</button> <button onclick="filtrar('amadeirado')">Amadeirado</button> <button onclick="filtrar('oriental')">Oriental</button> <button onclick="filtrar('citrico')">Cítrico</button> <button onclick="filtrar('doce')">Doce</button> </div> <div class="grid" id="grid"></div> </section> <!-- MODAL --> <div class="modal" id="modal"> <div class="modal-content"> <span class="close" onclick="fecharModal()">×</span> <img id="modalImg"> <h2 id="modalNome"></h2> <p id="modalDesc"></p> <div class="preco" id="modalPreco"></div> <button onclick="addCarrinho(modalIndex)">Adicionar ao carrinho</button> <button onclick="fecharModal()">Fechar</button> </div> </div> <!-- CARRINHO --> <div class="cart" id="cart"> <h2>Carrinho</h2> <div id="cartItens"></div> <div class="cart-footer"> <button onclick="toggleCart()">Fechar</button><br><br> <button onclick="finalizar()">Finalizar no WhatsApp</button> </div> </div> <!-- NOTIFICAÇÃO FAKE --> <div class="notification" id="notification"></div> <section id="sobre"><footer><h2>Sobre</h2><p>Especialistas em perfumes importados</p></footer></section> <section id="contato"><footer><h2>Contato</h2><p>WhatsApp: Marcele</p><p>Email: motojhon@gmail.com</p></footer></section> <a class="whatsapp" href="https://wa.me/5521965109590" target="_blank">💬</a> <script> /* MOBILE MENU */ function toggleMobile(){document.getElementById("mobileMenu").classList.toggle("open");} /* PERFUMES */ let categorias=["amadeirado","oriental","citrico","doce"] let perfumes=[] for(let i=1;i<=12;i++){ perfumes.push({ nome:"Perfume "+i, preco: i===3?149:199, // ex: Perfume 3 em promoção categoria:categorias[i%4], desc:"Fragrância sofisticada com aroma marcante e elegante.", img:"https://source.unsplash.com/400x400/?perfume,"+i, maisVendido: i===2||i===7 }) } /* RENDER GRID */ function render(lista=perfumes){ let grid=document.getElementById("grid");grid.innerHTML="" lista.forEach((p,i)=>{ grid.innerHTML+=` <div class="card" onclick="abrirModal(${i})"> ${p.maisVendido?'<div class="badge">Mais Vendido</div>':''} <img src="${p.img}"> <h3>${p.nome}</h3> <div class="stars">★★★★★</div> <div class="preco">R$ ${p.preco}</div> <div class="estoque">Restam poucas unidades</div> <p>${p.desc}</p> </div>`})} render() /* MODAL */ let modalIndex=0 function abrirModal(i){ modalIndex=i document.getElementById("modal").style.display="flex" document.getElementById("modalImg").src=perfumes[i].img document.getElementById("modalNome").innerText=perfumes[i].nome document.getElementById("modalDesc").innerText=perfumes[i].desc document.getElementById("modalPreco").innerText="R$ "+perfumes[i].preco } function fecharModal(){document.getElementById("modal").style.display="none"} /* BUSCA */ function buscar(txt){ txt=txt.toLowerCase() let filtrado=perfumes.filter(p=>p.nome.toLowerCase().includes(txt)) render(filtrado) } /* FILTRO */ function filtrar(cat){cat=="todos"?render():render(perfumes.filter(p=>p.categoria==cat))} /* CARRINHO */ let carrinho=[] function addCarrinho(i){ let item=carrinho.find(p=>p.nome==perfumes[i].nome) if(item)item.qtd++ else carrinho.push({...perfumes[i],qtd:1}) renderCart() showNotification(`${perfumes[i].nome} adicionado ao carrinho`) } function renderCart(){ let div=document.getElementById("cartItens");div.innerHTML="" carrinho.forEach((p,i)=>{ div.innerHTML+=`<div class="cart-item"><span>${p.nome} x${p.qtd}</span><button onclick="remover(${i})">X</button></div>`})} function remover(i){carrinho.splice(i,1);renderCart()} function toggleCart(){document.getElementById("cart").classList.toggle("open")} function finalizar(){ if(carrinho.length==0){alert("Adicione perfumes ao carrinho!");return;} let msg="*NOVO PEDIDO MOTO JHON*%0A%0A" carrinho.forEach(p=>{msg+=`• ${p.nome} x${p.qtd} | R$ ${p.preco*p.qtd}%0A`}) window.open("https://wa.me/5521965109590?text="+msg) } /* NOTIFICAÇÃO FAKE */ function showNotification(txt){ let notif=document.getElementById("notification") notif.innerText=txt notif.style.opacity="1" setTimeout(()=>{notif.style.opacity="0"},3000) } /* BANNER ROTATIVO */ let slides=document.querySelectorAll(".slide"),index=0 function mudarSlide(n){index+=n;if(index>=slides.length)index=0;if(index<0)index=slides.length-1;slides.forEach(s=>s.classList.remove("active"));slides[index].classList.add("active")} setInterval(()=>{mudarSlide(1)},5000) </script> </body> </html>

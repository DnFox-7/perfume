<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Moto Jhon | Perfumes Importados</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Poppins",sans-serif;
}

body{
background:#f3f3f3;
color:#222;
}

/* NAVBAR */

nav{
background:#0b0b0b;

box-shadow:0 5px 20px rgba(0,0,0,0.25);

}

.zap:hover{

}

/* HERO */

.hero{

height:360px;

background:
linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.55)),
url("https://images.unsplash.com/photo-1594035910387-fea47794261f?auto=format&fit=crop&w=1500&q=80");

background-size:cover;
background-position:center;

display:flex;
align-items:center;
justify-content:center;
text-align:center;

}

/* LAYOUT */

.container{
max-width:1300px;
margin:auto;
display:grid;
grid-template-columns:1fr 330px;
gap:40px;
padding:40px 5%;
}

@media(max-width:900px){

.container{
grid-template-columns:1fr;
}

}

/* GRID PRODUTOS */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));

}

/* CARD */

.card{

box-shadow:0 10px 25px rgba(0,0,0,0.08);

}

.btn-zap:hover{

}

footer{
margin-top:40px;

font-size:14px;
}

</style>

</head>

<body>

<nav>

<div class="logo">Moto Jhon</div>

<a class="zap" href="https://wa.me/5521965109590">
WhatsApp
</a>

</nav>

<div class="hero">
Perfumes Importados
</div>

<div class="container">

<div class="grid" id="produtos"></div>

<div class="cart">

<h2>Seu Pedido</h2>

<div id="cart-items">
Carrinho vazio
</div>

<div class="total">
<span>Total</span>
<span id="total">R$ 0</span>
</div>

<button class="btn-zap" onclick="checkout()">
Finalizar no WhatsApp
</button>

</div>

</div>

<footer>
Perfumes Importados • Atendimento via WhatsApp
</footer>

<script>

const produtos=[

{
nome:"Bleu de Chanel",
preco:890,
img:"https://m.media-amazon.com/images/I/61mI-9Yp+jL._AC_SL1000_.jpg",
desc:"Elegância e sofisticação."
},

{
nome:"Sauvage Dior",
preco:720,
img:"https://m.media-amazon.com/images/I/71N+XSHm5EL._AC_SL1500_.jpg",
desc:"Frescor intenso e masculino."
},

{
nome:"Good Girl",
preco:650,
img:"https://m.media-amazon.com/images/I/61rFZ+YAYSL._AC_SL1000_.jpg",
desc:"Fragrância feminina poderosa."
},

{
nome:"1 Million",
preco:680,
img:"https://m.media-amazon.com/images/I/71r0A4+4K-L._AC_SL1500_.jpg",
desc:"Perfume marcante e luxuoso."
}

]

const grid=document.getElementById("produtos")

produtos.forEach(p=>{

grid.innerHTML+=`

<div class="card">

<img src="${p.img}">

<div class="card-body">

<h3>${p.nome}</h3>

<p>${p.desc}</p>

<div class="price">R$ ${p.preco}</div>

<button class="btn" onclick="add('${p.nome}',${p.preco})">
Adicionar ao carrinho
</button>

</div>

</div>

`

})

let cart=[]

function add(nome,preco){

const item=cart.find(i=>i.nome===nome)

if(item){
item.qtd++
}else{
cart.push({nome,preco,qtd:1})
}

render()

}

function alterar(nome,valor){

const item=cart.find(i=>i.nome===nome)

item.qtd+=valor

if(item.qtd<=0){
cart=cart.filter(i=>i.nome!==nome)
}

render()

}

function remover(nome){

cart=cart.filter(i=>i.nome!==nome)

render()

}

function render(){

const el=document.getElementById("cart-items")

if(cart.length===0){

el.innerHTML="Carrinho vazio"
document.getElementById("total").innerText="R$ 0"
return

}

let html=""
let total=0

cart.forEach(i=>{

total+=i.preco*i.qtd

html+=`

<div class="cart-item">

<strong>${i.nome}</strong>

<div class="qty">

<button onclick="alterar('${i.nome}',-1)">-</button>

<span>${i.qtd}</span>

<button onclick="alterar('${i.nome}',1)">+</button>

</div>

<div class="remove" onclick="remover('${i.nome}')">
remover
</div>

</div>

`

})

el.innerHTML=html
document.getElementById("total").innerText="R$ "+total

}

function checkout(){

if(cart.length===0){

alert("Adicione produtos")

return

}

let msg="Pedido:%0A"
let total=0

cart.forEach(i=>{

msg+=`${i.qtd}x ${i.nome}%0A`
total+=i.preco*i.qtd

})

msg+=`%0ATotal: R$ ${total}`

window.open(`https://wa.me/5521965109590?text=${msg}`)

}

</script>

</body>
</html>

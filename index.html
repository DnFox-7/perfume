<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:#f5f5f5;
}

/* NAVBAR */

nav{

background:black;
color:white;

display:flex;
justify-content:space-between;
align-items:center;

padding:20px 8%;

position:sticky;
top:0;

}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
}

nav a:hover{
color:#d4af37;
}

/* HERO */

.hero{

height:300px;

background:
linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
url("https://images.unsplash.com/photo-1594035910387-fea47794261f");

background-size:cover;
background-position:center;

display:flex;
align-items:center;
justify-content:center;

color:white;
font-size:40px;

}

/* FILTRO */

.filtros{

display:flex;
justify-content:center;
gap:15px;

margin:40px 0;

}

.filtros button{

border:none;
padding:10px 18px;

background:white;
cursor:pointer;

border-radius:30px;

box-shadow:0 4px 10px rgba(0,0,0,0.1);

}

.filtros button:hover{
background:#d4af37;
color:white;
}

/* GRID */

.produtos{

max-width:1200px;
margin:auto;

display:grid;

grid-template-columns:repeat(auto-fit,minmax(230px,1fr));

gap:25px;

padding:20px;

}

/* CARD */

.card{

background:white;

border-radius:10px;

overflow:hidden;

box-shadow:0 10px 25px rgba(0,0,0,0.1);

transition:0.3s;

}

.card:hover{

transform:translateY(-6px);

}

.card img{

width:100%;
height:220px;
object-fit:cover;

}

.info{
padding:15px;
}

.preco{
color:#d4af37;
font-weight:600;
margin:8px 0;
}

.btn{

background:black;
color:white;

border:none;
padding:10px;

width:100%;

cursor:pointer;

}

footer{

background:#111;
color:#aaa;

text-align:center;

padding:30px;
margin-top:50px;

}

</style>
</head>

<script>

function filtrar(tipo){

let produtos=document.querySelectorAll(".card")

produtos.forEach(produto=>{

if(tipo=="todos"){

produto.style.display="block"

}else if(produto.classList.contains(tipo)){

produto.style.display="block"

}else{

produto.style.display="none"

}

})

}

</script>

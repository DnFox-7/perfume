```html
<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MOTO JHON</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f0f0f;
color:white;
}

/* NAVBAR */

header{
position:fixed;
top:0;
width:100%;
background:black;
z-index:1000;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
}

.logo{
color:gold;
font-size:22px;
font-weight:bold;
}

nav ul{
display:flex;
gap:20px;
list-style:none;
}

nav a{
color:white;
text-decoration:none;
}

.menu-mobile{
display:none;
font-size:26px;
cursor:pointer;
}

.cart-btn{
cursor:pointer;
font-size:22px;
}

#cartCount{
background:red;
border-radius:50%;
padding:3px 7px;
font-size:12px;
margin-left:5px;
}

/* MOBILE */

@media(max-width:768px){

nav ul{
display:none;
position:absolute;
top:60px;
left:0;
background:#111;
width:100%;
flex-direction:column;
padding:20px;
}

nav ul.active{
display:flex;
}

.menu-mobile{
display:block;
}

}

/* BANNER */

.banner{
margin-top:70px;
height:350px;
overflow:hidden;
position:relative;
}

.banner img{
width:100%;
height:350px;
object-fit:cover;
position:absolute;
opacity:0;
transition:1s;
}

.banner img.active{
opacity:1;
}

/* CONTROLES */

.controls{
display:flex;
justify-content:center;
gap:15px;
padding:25px;
flex-wrap:wrap;
}

.controls input{
padding:10px;
border:none;
border-radius:5px;
}

/* GRID */

.produtos{
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

/* CARD */

.card{
background:#141414;
border-radius:12px;
padding:20px;
text-align:center;
position:relative;
transition:.3s;
cursor:pointer;
border:1px solid rgba(255,215,0,0.2);
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 20px rgba(255,215,0,0.4);
}

.card img{
width:100%;
border-radius:10px;
}

.top{
position:absolute;
top:10px;
right:10px;
background:#ff3c00;
color:white;
font-size:11px;
padding:5px 10px;
border-radius:5px;
}

.preco{
color:gold;
font-size:20px;
font-weight:bold;
margin:10px 0;
}

.viewing{
font-size:12px;
color:#aaa;
}

.estoque{
font-size:12px;
color:#ffcc00;
}

.add{
background:gold;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
width:100%;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:2000;
}

.modal-content{
background:#111;
padding:30px;
border-radius:10px;
max-width:420px;
text-align:center;
}

.modal img{
width:100%;
border-radius:10px;
transition:.3s;
}

.modal img:hover{
transform:scale(1.2);
}

.close{
cursor:pointer;
font-size:25px;
float:right;
}

/* CARRINHO */

.cart{
position:fixed;
right:-400px;
top:0;
width:350px;
height:100%;
background:#111;
padding:20px;
transition:.4s;
overflow:auto;
border-left:2px solid gold;
}

.cart.open{
right:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:10px 0;
background:#1a1a1a;
padding:8px;
border-radius:5px;
}

.cart-item button{
background:red;
border:none;
color:white;
cursor:pointer;
}

/* NOTIFICAÇÃO */

.notify{
position:fixed;
bottom:20px;
left:20px;
background:#111;
padding:15px;
border-radius:8px;
border:1px solid gold;
display:none;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
text-decoration:none;
color:white;
}

</style>
</head>

<body>

<header>

<nav>

<div class="logo">MOTO JHON</div>

<div class="menu-mobile" onclick="menuMobile()">☰</div>

<ul id="menu">
<li><a href="#">Home</a></li>
<li><a href="#produtos">Produtos</a></li>
<li><a href="#">Sobre</a></li>
<li><a href="#">Contato</a></li>
</ul>

<div class="cart-btn" onclick="toggleCart()">
🛒 <span id="cartCount">0</span>
</div>

</nav>

</header>

<div class="banner">
<img src="https://images.unsplash.com/photo-1594035910387-fea47794261f" class="active">
<img src="https://images.unsplash.com/photo-1615634260167-c8cdede054de">
<img src="https://images.unsplash.com/photo-1585386959984-a41552231658">
</div>

<div class="controls">
<input type="text" placeholder="Buscar perfume..." onkeyup="buscar(this.value)">
</div>

<section class="produtos" id="produtos">
<div class="grid" id="grid"></div>
</section>

<div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="fecharModal()">✖</span>
<img id="modalImg">
<h2 id="modalNome"></h2>
<p id="modalDesc"></p>
<div class="preco" id="modalPreco"></div>
<button class="add" onclick="addCarrinho(modalIndex)">Adicionar ao carrinho</button>
</div>
</div>

<div class="cart" id="cart">
<h2>Carrinho</h2>
<div id="cartItens"></div>
<div id="cartTotal"></div>
<button onclick="finalizar()">Finalizar no WhatsApp</button>
</div>

<div class="notify" id="notify"></div>

<a class="whatsapp" href="https://wa.me/5521965109590">💬</a>

<script>

function menuMobile(){
menu.classList.toggle("active")
}

let banners=document.querySelectorAll(".banner img")
let b=0

setInterval(()=>{
banners[b].classList.remove("active")
b=(b+1)%banners.length
banners[b].classList.add("active")
},4000)

let perfumes=[]

for(let i=1;i<=12;i++){
perfumes.push({
nome:"Perfume "+i,
preco:Math.floor(Math.random()*150)+150,
desc:"Perfume importado com excelente fixação e fragrância marcante.",
img:"https://source.unsplash.com/400x400/?perfume",
estoque:Math.floor(Math.random()*5)+1,
view:Math.floor(Math.random()*30)+5,
top:[1,3,7,10].includes(i)
})
}

function render(lista=perfumes){

grid.innerHTML=""

lista.forEach((p,i)=>{

grid.innerHTML+=`

<div class="card" onclick="abrirModal(${i})">

${p.top?'<div class="top">MAIS VENDIDO</div>':''}

<img src="${p.img}">

<h3>${p.nome}</h3>

<div class="preco">R$ ${p.preco}</div>

<div class="viewing">👁 ${p.view} pessoas vendo agora</div>

<div class="estoque">⚠ restam ${p.estoque} unidades</div>

<div>⭐⭐⭐⭐⭐</div>

<button class="add" onclick="event.stopPropagation();addCarrinho(${i})">
Adicionar
</button>

</div>

`
})
}

render()

function buscar(txt){
txt=txt.toLowerCase()
render(perfumes.filter(p=>p.nome.toLowerCase().includes(txt)))
}

let modalIndex=0

function abrirModal(i){

modalIndex=i
let p=perfumes[i]

modalImg.src=p.img
modalNome.innerText=p.nome
modalDesc.innerText=p.desc
modalPreco.innerText="R$ "+p.preco

modal.style.display="flex"

}

function fecharModal(){
modal.style.display="none"
}

let carrinho=[]

function addCarrinho(i){

let item=carrinho.find(p=>p.nome==perfumes[i].nome)

if(item){item.qtd++}
else{carrinho.push({...perfumes[i],qtd:1})}

renderCart()

}

function renderCart(){

cartItens.innerHTML=""

let total=0

carrinho.forEach((p,i)=>{

total+=p.preco*p.qtd

cartItens.innerHTML+=`

<div class="cart-item">

<span>${p.nome} x${p.qtd}</span>

<button onclick="remover(${i})">X</button>

</div>

`

})

cartTotal.innerText="Total: R$ "+total
cartCount.innerText=carrinho.reduce((a,b)=>a+b.qtd,0)

}

function remover(i){
carrinho.splice(i,1)
renderCart()
}

function toggleCart(){
cart.classList.toggle("open")
}

function finalizar(){

let msg="Olá, gostaria de comprar:%0A"

carrinho.forEach(p=>{
msg+=`${p.nome} x${p.qtd}%0A`
})

window.open("https://wa.me/5521965109590?text="+msg)

}

let nomes=["Carlos","Ana","Pedro","Lucas","Mariana"]

setInterval(()=>{

let p=perfumes[Math.floor(Math.random()*perfumes.length)]
let nome=nomes[Math.floor(Math.random()*nomes.length)]

notify.innerText=nome+" comprou "+p.nome+" agora"

notify.style.display="block"

setTimeout(()=>{
notify.style.display="none"
},3000)

},7000)

</script>

</body>
</html>
```

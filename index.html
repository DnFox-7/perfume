<!DOCTYPE html> <html lang="pt-br"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>MOTO JHON | Perfumes</title> <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"> <style> :root{ --gold:#c5a059; --black:#0a0a0a; --white:#ffffff; --gray-light:#f9f9f9; --gray-border:#e0e0e0; --text-muted:#aaa; --radius:12px; --shadow:0 10px 30px rgba(0,0,0,0.1); } /* RESET */ *{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth;} body{font-family:'Inter', sans-serif;background:#111;color:white;line-height:1.6;} a{text-decoration:none;color:inherit;} /* NAVBAR */ header{ position:fixed;top:0;width:100%;z-index:1000; background:rgba(0,0,0,0.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--gray-border); } nav{display:flex;justify-content:space-between;align-items:center;padding:1rem 5%;} .logo{font-family:'Playfair Display', serif;font-size:1.6rem;font-weight:700;color:var(--gold);} .nav-links a{margin-left:2rem;font-weight:600;font-size:0.85rem;text-transform:uppercase;color:white;transition:.3s;} .nav-links a:hover{color:var(--gold);} .cart-btn{cursor:pointer;font-size:1.5rem;} /* BANNER ROTATIVO */ .banner{margin-top:70px;position:relative;height:70vh;overflow:hidden;} .slide{position:absolute;width:100%;height:100%;background-size:cover;background-position:center;opacity:0;transition:1s;display:flex;align-items:center;justify-content:center;} .slide.active{opacity:1;} .slide-content{background:rgba(0,0,0,0.6);padding:30px 60px;border-radius:12px;text-align:center;} .slide-content h2{font-family:'Playfair Display', serif;font-size:clamp(2rem,5vw,3rem);} .slide-content p{margin-top:10px;font-size:1.1rem;} .banner-btn{position:absolute;top:50%;transform:translateY(-50%);font-size:2rem;background:rgba(0,0,0,.5);border:none;color:white;padding:10px;cursor:pointer;} .prev{left:20px;}.next{right:20px;} /* BUSCA */ .search{padding:30px;text-align:center;} .search input{padding:10px;width:300px;border-radius:8px;border:none;font-size:1rem;} /* CATEGORIAS */ .categorias{display:flex;justify-content:center;gap:10px;margin:20px 0;flex-wrap:wrap;} .categorias button{padding:8px 15px;border-radius:50px;background:#222;color:white;border:none;cursor:pointer;transition:.3s;font-weight:600;} .categorias button:hover,.categorias button.active{background:var(--gold);color:black;} /* PRODUTOS */ .produtos{padding:20px 5%;} .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:25px;} .card{background:#1a1a1a;border-radius:var(--radius);overflow:hidden;text-align:center;cursor:pointer;transition:.3s;position:relative;} .card:hover{transform:translateY(-5px);box-shadow:var(--shadow);} .card img{width:100%;height:220px;object-fit:cover;transition:.3s;} .card h3{margin:10px 0;font-family:'Playfair Display', serif;} .card p{font-size:0.85rem;color:var(--text-muted);min-height:40px;} .preco{color:var(--gold);font-weight:700;margin:5px 0;} .badge{position:absolute;top:10px;left:10px;background:red;padding:5px 10px;font-size:12px;border-radius:5px;} .stars{color:gold;margin-bottom:5px;font-size:0.9rem;} .estoque{font-size:12px;color:var(--text-muted);} /* MODAL */ .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);align-items:center;justify-content:center;z-index:10000;} .modal-content{background:#111;padding:20px;border-radius:12px;max-width:500px;text-align:center;position:relative;} .modal-content img{width:100%;border-radius:12px;cursor:zoom-in;transition:.3s;} .modal-content img:hover{transform:scale(1.2);} .close-modal{position:absolute;top:10px;right:15px;font-size:2rem;cursor:pointer;color:white;} /* CARRINHO */ .cart{position:fixed;right:-400px;top:0;width:350px;height:100%;background:#111;padding:20px;overflow:auto;transition:.4s;z-index:9999;} .cart.open{right:0;} .cart h2{margin-bottom:15px;font-family:'Playfair Display', serif;} .cart-item{display:flex;justify-content:space-between;align-items:center;margin:10px 0;background:#222;padding:10px;border-radius:10px;} .cart-item span{flex:1;} .cart-item button{background:red;color:white;border:none;padding:5px 8px;border-radius:6px;cursor:pointer;transition:.3s;} .cart-item button:hover{background:#ff4d4d;} .cart-total{margin-top:20px;font-weight:700;display:flex;justify-content:space-between;font-size:1.2rem;} .cart-actions{margin-top:20px;display:flex;flex-direction:column;gap:10px;} .cart-actions button{padding:12px;border:none;border-radius:8px;cursor:pointer;font-weight:700;transition:.3s;} .cart-actions .close-cart{background:#444;color:white;} .cart-actions .checkout{background:#25D366;color:white;} /* FOOTER */ footer{background:#000;text-align:center;padding:40px;margin-top:40px;color:var(--text-muted);} .whatsapp{position:fixed;bottom:20px;right:20px;background:#25D366;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;text-decoration:none;color:white;z-index:10000;} </style> </head> <body> <header> <nav> <div class="logo">MOTO JHON</div> <div class="nav-links"> <a href="#home">Home</a> <a href="#produtos">Produtos</a> <a href="#sobre">Sobre</a> <a href="#contato">Contato</a> </div> <div class="cart-btn" onclick="toggleCart()">🛒</div> </nav> </header> <!-- BANNER --> <section class="banner" id="home"> <div class="slide active" style="background-image:url('https://source.unsplash.com/1600x600/?perfume')"> <div class="slide-content"><h2>Perfumes Importados</h2><p>Elegância e sofisticação</p></div> </div> <div class="slide" style="background-image:url('https://source.unsplash.com/1600x600/?fragrance')"> <div class="slide-content"><h2>Fragrâncias Exclusivas</h2><p>Luxo em cada detalhe</p></div> </div> <button class="banner-btn prev" onclick="mudarSlide(-1)">❮</button> <button class="banner-btn next" onclick="mudarSlide(1)">❯</button> </section> <!-- BUSCA --> <section class="search"> <input type="text" placeholder="Buscar perfume..." onkeyup="buscar(this.value)"> </section> <!-- PRODUTOS --> <section class="produtos" id="produtos"> <div class="categorias"> <button onclick="filtrar('todos')" class="active">Todos</button> <button onclick="filtrar('amadeirado')">Amadeirado</button> <button onclick="filtrar('oriental')">Oriental</button> <button onclick="filtrar('citrico')">Cítrico</button> <button onclick="filtrar('doce')">Doce</button> </div> <div class="grid" id="grid"></div> </section> <!-- MODAL --> <div class="modal" id="modal"> <div class="modal-content"> <span class="close-modal" onclick="fecharModal()">×</span> <img id="modalImg"> <h2 id="modalNome"></h2> <p id="modalDesc"></p> <div class="preco" id="modalPreco"></div> <button onclick="addCarrinho(modalIndex)">Adicionar ao carrinho</button> </div> </div> <!-- CARRINHO --> <div class="cart" id="cart"> <h2>Carrinho</h2> <div id="cartItens"></div> <div class="cart-total"> <span>Total:</span><span id="totalVal">R$ 0,00</span> </div> <div class="cart-actions"> <button class="close-cart" onclick="toggleCart()">Fechar Carrinho</button> <button class="checkout" onclick="finalizar()">Finalizar no WhatsApp</button> </div> </div> <section id="sobre"><footer><h2>Sobre</h2><p>Especialistas em perfumes importados</p></footer></section> <section id="contato"><footer><h2>Contato</h2><p>WhatsApp: Marcele</p><p>Email: motojhon@gmail.com</p></footer></section> <a class="whatsapp" href="https://wa.me/5521965109590" target="_blank">💬</a> <script> // PERFUMES let categorias=["amadeirado","oriental","citrico","doce"]; let perfumes=[]; for(let i=1;i<=12;i++){ perfumes.push({ nome:"Perfume "+i, preco:i===3?149:199, original:i===3?199:199, categoria:categorias[i%4], desc:"Descrição detalhada do Perfume "+i+". Aroma marcante e sofisticado.", img:"https://source.unsplash.com/400x400/?perfume,"+i, maisVendido:i===1||i===5 }); } // RENDER PRODUTOS function render(lista=perfumes){ let grid=document.getElementById("grid"); grid.innerHTML=""; lista.forEach((p,i)=>{ grid.innerHTML+=`<div class="card" onclick="abrirModal(${i})" data-categoria="${p.categoria}"> ${p.maisVendido?'<div class="badge">Mais vendido</div>':''} <img src="${p.img}"> <h3>${p.nome}</h3> <div class="stars">★★★★★</div> <div class="preco">R$ ${p.preco}</div> <div class="estoque">Restam poucas unidades</div> <p>${p.desc}</p> </div>`; }); } render(); // MODAL let modalIndex=0; function abrirModal(i){ modalIndex=i; document.getElementById("modal").style.display="flex"; document.getElementById("modalImg").src=perfumes[i].img; document.getElementById("modalNome").innerText=perfumes[i].nome; document.getElementById("modalDesc").innerText=perfumes[i].desc; document.getElementById("modalPreco").innerText="R$ "+perfumes[i].preco; } function fecharModal(){document.getElementById("modal").style.display="none";} // FILTRO function filtrar(cat){ document.querySelectorAll('.categorias button').forEach(b=>b.classList.remove('active')); if(cat!="todos") document.querySelector(`.categorias button[onclick="filtrar('${cat}')"]`).classList.add('active'); else document.querySelector(`.categorias button[onclick="filtrar('todos')"]`).classList.add('active'); if(cat=="todos") render(); else render(perfumes.filter(p=>p.categoria==cat)); } // BUSCA function buscar(txt){ txt=txt.toLowerCase(); render(perfumes.filter(p=>p.nome.toLowerCase().includes(txt))); } // BANNER let slides=document.querySelectorAll(".slide"); let index=0; function mudarSlide(n){ index+=n; if(index>=slides.length)index=0; if(index<0)index=slides.length-1; slides.forEach(s=>s.classList.remove("active")); slides[index].classList.add("active"); } setInterval(()=>{mudarSlide(1);},5000); // CARRINHO let carrinho=[]; function addCarrinho(i){ let item=carrinho.find(p=>p.nome===perfumes[i].nome); if(item)item.qtd++; else carrinho.push({...perfumes[i],qtd:1}); renderCart(); } function renderCart(){ let div=document.getElementById("cartItens"); let total=0; div.innerHTML=""; carrinho.forEach((p,i)=>{ total+=p.preco*p.qtd; div.innerHTML+=`<div class="cart-item"> <span>${p.nome} x${p.qtd}</span> <button onclick="remover(${i})">X</button> </div>`; }); document.getElementById("totalVal").innerText="R$ "+total.toLocaleString('pt-BR',{minimumFractionDigits:2}); } function remover(i){carrinho.splice(i,1);renderCart();} function toggleCart(){document.getElementById("cart").classList.toggle("open");} // WHATSAPP function finalizar(){ if(carrinho.length===0){alert("Carrinho vazio!");return;} let total=0; let msg="Olá, gostaria de comprar:%0A"; carrinho.forEach(p=>{total+=p.preco*p.qtd;msg+=`${p.nome} x${p.qtd} - R$ ${(p.preco*p.qtd).toLocaleString('pt-BR',{minimumFractionDigits:2})}%0A`;}); msg+=`Total: R$ ${total.toLocaleString('pt-BR',{minimumFractionDigits:2})}`; window.open("https://wa.me/5521965109590?text="+msg); } </script> </body> </html>

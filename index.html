<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Moto Jhon Perfumes</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{background:#f3f3f3}

/* NAVBAR */

nav{
background:black;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 8%;
position:sticky;
top:0;
z-index:999
}

.logo{font-size:20px;font-weight:600}

.menu{display:flex;gap:25px}

.menu a{color:white;text-decoration:none}

.menu a:hover{color:#d4af37}

.hamburger{display:none;font-size:24px;cursor:pointer}

/* BUSCA */

.search{
max-width:1000px;
margin:30px auto;
display:flex;
justify-content:center
}

.search input{
width:80%;
padding:12px;
border-radius:30px;
border:1px solid #ccc
}

/* FILTROS */

.filtros{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:25px
}

.filtros button{
border:none;
padding:8px 15px;
background:white;
border-radius:30px;
cursor:pointer;
box-shadow:0 2px 8px rgba(0,0,0,0.1)
}

.filtros button:hover{
background:#d4af37;
color:white
}

/* PRODUTOS */

.produtos{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding:20px
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
transition:0.3s
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 20px 40px rgba(0,0,0,0.2)
}

.card img{
width:100%;
height:220px;
object-fit:cover
}

.info{padding:15px}

.preco{
color:#d4af37;
font-weight:600;
margin:5px 0
}

.estrelas{color:gold;font-size:14px}

.qtd{
width:60px;
margin-top:5px
}

.btn{
background:black;
color:white;
border:none;
padding:10px;
width:100%;
margin-top:8px;
cursor:pointer
}

/* CARRINHO */

.cart{
position:fixed;
right:-350px;
top:0;
width:320px;
height:100%;
background:white;
box-shadow:-5px 0 20px rgba(0,0,0,0.2);
padding:20px;
transition:0.4s;
z-index:1000
}

.cart.open{right:0}

.cart h2{margin-bottom:20px}

.cart-item{
display:flex;
justify-content:space-between;
margin-bottom:8px;
font-size:14px
}

.remove{
color:red;
cursor:pointer
}

.total{
margin-top:15px;
font-weight:600
}

.whats{
display:block;
margin-top:15px;
background:#25D366;
color:white;
text-align:center;
padding:10px;
text-decoration:none;
border-radius:6px
}

.cart-btn{
position:fixed;
right:20px;
bottom:20px;
background:black;
color:white;
padding:15px;
border-radius:50%;
cursor:pointer
}

/* MOBILE */

@media(max-width:768px){

.menu{
display:none;
flex-direction:column;
background:black;
position:absolute;
top:60px;
right:0;
width:200px;
padding:20px
}

.menu.show{display:flex}

.hamburger{display:block}

}

/* FOOTER */

footer{
background:#111;
color:#aaa;
text-align:center;
padding:30px;
margin-top:40px
}

</style>
</head>

<body>

<nav>

<div class="logo">Moto Jhon</div>

<div class="hamburger" onclick="toggleMenu()">☰</div>

<div class="menu" id="menu">
<a href="#">Home</a>
<a href="#">Produtos</a>
<a href="#">Contato</a>
</div>

</nav>

<div class="search">
<input type="text" id="search" placeholder="Buscar perfume...">
</div>

<div class="filtros">
<button onclick="filtrar('todos')">Todos</button>
<button onclick="filtrar('amadeirado')">Amadeirado</button>
<button onclick="filtrar('citrico')">Cítrico</button>
<button onclick="filtrar('doce')">Doce</button>
<button onclick="filtrar('oriental')">Oriental</button>
</div>

<div class="produtos" id="produtos"></div>

<div class="cart" id="cart">

<h2>Carrinho</h2>

<div id="cartItems"></div>

<div class="total" id="total"></div>

<a class="whats" id="finalizar" target="_blank">Finalizar no WhatsApp</a>

</div>

<div class="cart-btn" onclick="toggleCart()">🛒</div>

<footer>
Moto Jhon Perfumes © 2026
</footer>

<script>

const zap="5521965109590"

const produtos=[
{name:"Perfume 1",categoria:"amadeirado",preco:390,img:"https://images.unsplash.com/photo-1541643600914-78b084683601"},
{name:"Perfume 2",categoria:"amadeirado",preco:410,img:"https://images.unsplash.com/photo-1585386959984-a41552231658"},
{name:"Perfume 3",categoria:"amadeirado",preco:420,img:"https://images.unsplash.com/photo-1600180758890-6b94519a8ba3"},
{name:"Perfume 4",categoria:"citrico",preco:350,img:"https://images.unsplash.com/photo-1595425970377-7f0b9e7d7b2f"},
{name:"Perfume 5",categoria:"citrico",preco:360,img:"https://images.unsplash.com/photo-1615634260167-c8cdede054de"},
{name:"Perfume 6",categoria:"citrico",preco:380,img:"https://images.unsplash.com/photo-1523293182086-7651a899d37f"},
{name:"Perfume 7",categoria:"doce",preco:430,img:"https://images.unsplash.com/photo-1587019158091-1a103c5dd17f"},
{name:"Perfume 8",categoria:"doce",preco:440,img:"https://images.unsplash.com/photo-1592914610354-fd354ea45e48"},
{name:"Perfume 9",categoria:"doce",preco:410,img:"https://images.unsplash.com/photo-1600185365483-26d7a4cc7519"},
{name:"Perfume 10",categoria:"oriental",preco:470,img:"https://images.unsplash.com/photo-1615634260167-c8cdede054de"},
{name:"Perfume 11",categoria:"oriental",preco:450,img:"https://images.unsplash.com/photo-1585386959984-a41552231658"},
{name:"Perfume 12",categoria:"oriental",preco:480,img:"https://images.unsplash.com/photo-1541643600914-78b084683601"}
]

let carrinho=[]

function render(lista){

let html=""

lista.forEach((p,i)=>{

html+=`

<div class="card">

<img src="${p.img}">

<div class="info">

<h3>${p.name}</h3>

<div class="estrelas">★★★★★</div>

<div class="preco">R$ ${p.preco}</div>

<input type="number" min="1" value="1" class="qtd" id="q${i}">

<button class="btn" onclick="addCarrinho(${i})">Adicionar</button>

</div>

</div>

`

})

document.getElementById("produtos").innerHTML=html

}

render(produtos)

function filtrar(cat){

if(cat==="todos") render(produtos)

else render(produtos.filter(p=>p.categoria===cat))

}

document.getElementById("search").addEventListener("keyup",function(){

let termo=this.value.toLowerCase()

render(produtos.filter(p=>p.name.toLowerCase().includes(termo)))

})

function addCarrinho(i){

let qtd=document.getElementById("q"+i).value

carrinho.push({...produtos[i],qtd:parseInt(qtd)})

updateCart()

}

function updateCart(){

let html=""
let total=0

carrinho.forEach((p,i)=>{

total+=p.preco*p.qtd

html+=`
<div class="cart-item">
<span>${p.name} x${p.qtd}</span>
<span>R$${p.preco*p.qtd}</span>
<span class="remove" onclick="remover(${i})">✖</span>
</div>
`

})

document.getElementById("cartItems").innerHTML=html
document.getElementById("total").innerText="Total: R$ "+total

let msg="Olá, quero comprar:%0A"

carrinho.forEach(p=>{
msg+=`${p.name} x${p.qtd}%0A`
})

msg+=`Total: R$${total}`

document.getElementById("finalizar").href=`https://wa.me/${zap}?text=${msg}`

}

function remover(i){

carrinho.splice(i,1)

updateCart()

}

function toggleCart(){

document.getElementById("cart").classList.toggle("open")

}

function toggleMenu(){

document.getElementById("menu").classList.toggle("show")

}

</script>

</body>
</html>
```

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moto Jhon | Perfumes Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Poppins', sans-serif; }
        body { background:#f5f5f5; color: #333; }

        /* NAVBAR REFEITA */
        nav {
            background: black;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 8%;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
            transition: 0.3s;
        }

        .nav-links a:hover { color: #d4af37; }

        /* HERO - BANNER */
        .hero {
            height: 350px;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url("https://images.unsplash.com/photo-1594035910387-fea47794261f");
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: clamp(24px, 5vw, 40px);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* FILTROS */
        .filtros {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 40px 0;
            flex-wrap: wrap; /* Importante para celular */
        }

        .filtros button {
            border: 1px solid #ddd;
            padding: 8px 20px;
            background: white;
            cursor: pointer;
            border-radius: 30px;
            font-weight: 500;
            transition: 0.3s;
        }

        .filtros button:hover, .filtros button.active {
            background: #d4af37;
            color: white;
            border-color: #d4af37;
        }

        /* GRID DE PRODUTOS */
        .produtos {
            max-width: 1200px;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            padding: 20px;
        }

        /* CARD */
        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: 0.3s;
            border: 1px solid #eee;
        }

        .card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }

        .card img { width: 100%; height: 250px; object-fit: cover; }

        .info { padding: 20px; text-align: center; }
        .info h3 { font-size: 18px; margin-bottom: 5px; }

        .preco {
            color: #d4af37;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .btn {
            background: black;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn:hover { background: #d4af37; }

        footer {
            background: #111;
            color: #aaa;
            text-align: center;
            padding: 40px;
            margin-top: 50px;
        }

        /* AJUSTE PARA CELULAR */
        @media (max-width: 600px) {
            nav { flex-direction: column; gap: 10px; }
            .nav-links a { margin: 0 10px; }
            .hero { height: 200px; }
        }
    </style>
</head>

<body>

<nav>
    <h2>Moto Jhon</h2>
    <div class="nav-links">
        <a href="#home">Home</a>
        <a href="#produtos">Produtos</a>
        <a href="#sobre">Sobre</a>
    </div>
</nav>

<div class="hero" id="home">
    Perfumes Premium
</div>

<div class="filtros" id="produtos">
    <button onclick="filtrar('todos')" class="active">Todos</button>
    <button onclick="filtrar('amadeirado')">Amadeirado</button>
    <button onclick="filtrar('citrico')">Cítrico</button>
    <button onclick="filtrar('doce')">Doce</button>
    <button onclick="filtrar('oriental')">Oriental</button>
</div>

<div class="produtos">
    <div class="card amadeirado">
        <img src="https://images.unsplash.com/photo-1541643600914-78b084683601">
        <div class="info">
            <h3>Sauvage Dior</h3>
            <div class="preco">R$390</div>
            <button class="btn" onclick="comprar('Sauvage Dior', '390')">Comprar Agora</button>
        </div>
    </div>

    <div class="card citrico">
        <img src="https://images.unsplash.com/photo-1595425970377-7f0b9e7d7b2f">
        <div class="info">
            <h3>Light Blue</h3>
            <div class="preco">R$350</div>
            <button class="btn" onclick="comprar('Light Blue', '350')">Comprar Agora</button>
        </div>
    </div>

    </div>

<footer>
    Moto Jhon Perfumes Premium © 2026
</footer>

<script>
    // FUNÇÃO DE FILTRO
    function filtrar(tipo){
        let produtos = document.querySelectorAll(".card");
        
        // Ajuste de visual do botão
        document.querySelectorAll('.filtros button').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        produtos.forEach(produto => {
            if(tipo == "todos"){
                produto.style.display = "block";
            } else if(produto.classList.contains(tipo)){
                produto.style.display = "block";
            } else {
                produto.style.display = "none";
            }
        });
    }

    // FUNÇÃO PARA O WHATSAPP
    function comprar(nome, preco) {
        const numero = "5521999999999"; // COLOQUE SEU NÚMERO AQUI
        const mensagem = `Olá! Gostaria de comprar o perfume: ${nome} no valor de R$${preco}.`;
        const link = `https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`;
        window.open(link, '_blank');
    }
</script>

</body>
</html>
